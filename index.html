<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>minesweeper</title>
    <style>
        #push-toast {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000000;
            max-width: 360px;
            padding: 14px 40px 14px 14px;
            background: #fff;
            color: #1a1a1a;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12), 0 0 1px rgba(0, 0, 0, 0.06);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        #push-toast[hidden] {
            display: none;
        }
        #push-toast-close {
            position: absolute;
            top: 10px;
            right: 10px;
            border: 0;
            background: transparent;
            color: #999;
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            padding: 4px;
        }
        #push-toast-close:hover {
            color: #333;
        }
        .push-toast__main {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .push-toast__media {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .push-toast__icon {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #3ddc68, #28a745);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.35);
        }
        .push-toast__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .push-toast__image[hidden],
        .push-toast__icon[hidden] {
            display: none;
        }
        .push-toast__content {
            flex: 1;
            min-width: 0;
        }
        #push-toast-title {
            display: block;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.3;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        #push-toast-body {
            margin: 0;
            font-size: 13px;
            line-height: 1.4;
            color: #555;
        }
        #push-toast-link {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            background: #28a745;
            border-radius: 8px;
            text-decoration: none;
        }
        #push-toast-link:hover {
            background: #22963e;
        }
        #push-toast-link[hidden] {
            display: none;
        }
    </style>
</head>
<body>
<div id="root"></div>
<div id="push-toast" hidden>
    <button type="button" id="push-toast-close" aria-label="Закрыть">×</button>
    <div class="push-toast__main">
        <div class="push-toast__media">
            <div class="push-toast__icon" id="push-toast-icon" aria-hidden="true">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="9" stroke="#fff" stroke-width="1.5"/>
                    <path d="M3 12h18M12 3c2.5 2.8 4 6 4 9s-1.5 6.2-4 9M12 3c-2.5 2.8-4 6-4 9s1.5 6.2 4 9"
                          stroke="#fff" stroke-width="1.5"/>
                </svg>
            </div>
            <img class="push-toast__image" id="push-toast-image" alt="" hidden/>
        </div>
        <div class="push-toast__content">
            <strong id="push-toast-title"></strong>
            <p id="push-toast-body"></p>
            <a id="push-toast-link" href="#" target="_blank" rel="noopener">Открыть</a>
        </div>
    </div>
</div>
<button
        type="button"
        id="push-subscribe-btn"
        style="position:fixed;bottom:16px;right:16px;z-index:999999;padding:12px 20px;cursor:pointer;"
>
    Подписаться
</button>
<script
        charset="UTF-8"
        src="https://app-sms.dev.progmateq.com/upload/js/push-subscribe.js"
        data-api-base="https://vue-sms.dev.progmateq.com"
        data-embed-secret="BzbZBAdnEU3OctyKXkIE7iBFjVQ1LsYeN5YtSvi1"
        data-sw-url="/push-sw.js"
        data-button="#push-subscribe-btn"
        data-auto-init="1"
        async
></script>
<script>
    (function () {
        if (!('serviceWorker' in navigator)) return;
        function showPushToast(data) {
            var toast = document.getElementById('push-toast');
            var titleEl = document.getElementById('push-toast-title');
            var bodyEl = document.getElementById('push-toast-body');
            var linkEl = document.getElementById('push-toast-link');
            var iconEl = document.getElementById('push-toast-icon');
            var imageEl = document.getElementById('push-toast-image');
            titleEl.textContent = data.title || '';
            bodyEl.textContent = data.body || '';
            var imageUrl = (data.image || data.imageUrl || data.image_url || '').trim();
            if (imageUrl) {
                imageEl.src = imageUrl;
                imageEl.hidden = false;
                iconEl.hidden = true;
            } else {
                imageEl.removeAttribute('src');
                imageEl.hidden = true;
                iconEl.hidden = false;
            }
            var url = (data.url || '').trim();
            if (url && url !== '/') {
                linkEl.href = url;
                linkEl.hidden = false;
            } else {
                linkEl.href = '#';
                linkEl.hidden = true;
            }
            toast.hidden = false;
        }
        navigator.serviceWorker.addEventListener('message', function (event) {
            if (!event.data || event.data.type !== 'PUSH_RECEIVED') return;
            showPushToast(event.data);
        });
        document.getElementById('push-toast-close').addEventListener('click', function () {
            document.getElementById('push-toast').hidden = true;
        });
        navigator.serviceWorker.ready
            .then(function (reg) {
                return reg.pushManager.getSubscription();
            })
            .then(function (sub) {
                if (!sub || Notification.permission !== 'granted') return;
                var btn = document.getElementById('push-subscribe-btn');
                if (!btn) return;
                btn.disabled = true;
                btn.textContent = 'Notifications enabled';
            })
            .catch(function () {});
    })();
</script>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
